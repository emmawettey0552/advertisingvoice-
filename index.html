<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Smart Voice Advertising System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    overflow-x:hidden;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Animated Background */
body::before{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(0,255,255,0.08);
    border-radius:50%;
    top:-150px;
    left:-150px;
    animation:float 8s ease-in-out infinite;
}

body::after{
    content:'';
    position:fixed;
    width:400px;
    height:400px;
    background:rgba(255,0,128,0.08);
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    animation:float2 10s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(40px);}
    100%{transform:translateY(0px);}
}

@keyframes float2{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-40px);}
    100%{transform:translateY(0px);}
}

.container{
    width:100%;
    max-width:850px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
    position:relative;
    z-index:10;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    font-size:2.5rem;
    font-weight:700;
    background:linear-gradient(to right,#00ffff,#00ff88,#ffcc00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px rgba(0,255,255,0.3);
    }
    to{
        text-shadow:0 0 20px rgba(0,255,255,0.7);
    }
}

.logo p{
    margin-top:8px;
    color:#d1d5db;
}

.text-area{
    margin-top:25px;
}

textarea{
    width:100%;
    min-height:200px;
    border:none;
    outline:none;
    resize:none;
    padding:20px;
    border-radius:20px;
    font-size:18px;
    background:rgba(255,255,255,0.12);
    color:white;
    transition:0.3s;
}

textarea:focus{
    transform:scale(1.01);
    border:1px solid #00ffff;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
}

textarea::placeholder{
    color:#d1d5db;
}

.controls{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.control-box{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:18px;
}

.control-box label{
    display:block;
    margin-bottom:10px;
    font-size:14px;
    color:#d1d5db;
}

select,input[type=range]{
    width:100%;
}

.buttons{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

button{
    border:none;
    padding:16px;
    border-radius:18px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    color:white;
}

button:hover{
    transform:translateY(-3px) scale(1.02);
}

.speak-btn{
    background:linear-gradient(135deg,#00c853,#00e676);
}

.stop-btn{
    background:linear-gradient(135deg,#ff1744,#ff5252);
}

.record-btn{
    background:linear-gradient(135deg,#2979ff,#00b0ff);
}

.download-btn{
    background:linear-gradient(135deg,#ff9100,#ffcc00);
    color:#111;
}

.status{
    margin-top:25px;
    text-align:center;
    font-size:15px;
    color:#00ffcc;
    min-height:25px;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#d1d5db;
    font-size:14px;
}

.wave{
    display:flex;
    justify-content:center;
    gap:5px;
    margin-top:20px;
}

.wave span{
    width:6px;
    height:25px;
    background:#00ffff;
    border-radius:20px;
    animation:wave 1s infinite ease-in-out;
}

.wave span:nth-child(2){
    animation-delay:0.1s;
}
.wave span:nth-child(3){
    animation-delay:0.2s;
}
.wave span:nth-child(4){
    animation-delay:0.3s;
}
.wave span:nth-child(5){
    animation-delay:0.4s;
}

@keyframes wave{
    0%,100%{
        transform:scaleY(1);
    }
    50%{
        transform:scaleY(2.5);
    }
}

@media(max-width:768px){

    .logo h1{
        font-size:2rem;
    }

    textarea{
        min-height:180px;
        font-size:16px;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>Smart Voice Advertising System</h1>
        <p>Text-To-Speech + Audio Recording</p>
    </div>

    <div class="text-area">
        <textarea id="text"
        placeholder="Type your advert here...

Example:
Fresh cold water available!
Visit E & D Technology today!
Best aluminum works at affordable prices!"></textarea>
    </div>

    <div class="controls">

        <div class="control-box">
            <label>Voice</label>
            <select id="voiceSelect"></select>
        </div>

        <div class="control-box">
            <label>Speed</label>
            <input type="range" min="0.5" max="2" value="1" step="0.1" id="speed">
        </div>

        <div class="control-box">
            <label>Pitch</label>
            <input type="range" min="0" max="2" value="1" step="0.1" id="pitch">
        </div>

    </div>

    <div class="buttons">

        <button class="speak-btn" onclick="speakText()">
            🔊 Speak
        </button>

        <button class="stop-btn" onclick="stopSpeech()">
            ⛔ Stop
        </button>

        <button class="record-btn" onclick="toggleRecording()" id="recordBtn">
            🎙️ Record
        </button>

        <button class="download-btn" onclick="downloadAudio()">
            ⬇ Download
        </button>

    </div>

    <div class="wave">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="status" id="status">
        Ready...
    </div>

    <div class="footer">
        Powered by E & D TECHNOLOGY
    </div>

</div>

<script>

const textInput = document.getElementById('text');
const voiceSelect = document.getElementById('voiceSelect');
const speed = document.getElementById('speed');
const pitch = document.getElementById('pitch');
const statusText = document.getElementById('status');

let voices = [];
let mediaRecorder;
let audioChunks = [];
let audioBlob;

/* Load Voices */
function loadVoices(){
    voices = speechSynthesis.getVoices();

    voiceSelect.innerHTML = '';

    voices.forEach((voice,index)=>{
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${voice.name} (${voice.lang})`;
        voiceSelect.appendChild(option);
    });
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

/* Speak Text */
function speakText(){

    const text = textInput.value;

    if(text.trim() === ''){
        alert('Please type some text.');
        return;
    }

    const utterance = new SpeechSynthesisUtterance(text);

    utterance.voice = voices[voiceSelect.value];
    utterance.rate = speed.value;
    utterance.pitch = pitch.value;

    speechSynthesis.speak(utterance);

    statusText.innerHTML = '🔊 Speaking advert...';

    utterance.onend = ()=>{
        statusText.innerHTML = '✅ Finished speaking.';
    };

}

/* Stop Speech */
function stopSpeech(){
    speechSynthesis.cancel();
    statusText.innerHTML = '⛔ Speech stopped.';
}

/* Recording */
async function toggleRecording(){

    const recordBtn = document.getElementById('recordBtn');

    if(recordBtn.dataset.recording === 'true'){

        mediaRecorder.stop();

        recordBtn.dataset.recording = 'false';
        recordBtn.innerHTML = '🎙️ Record';

        statusText.innerHTML = '✅ Recording saved.';

    }else{

        const stream = await navigator.mediaDevices.getUserMedia({audio:true});

        mediaRecorder = new MediaRecorder(stream);

        audioChunks = [];

        mediaRecorder.ondataavailable = event=>{
            audioChunks.push(event.data);
        };

        mediaRecorder.onstop = ()=>{

            audioBlob = new Blob(audioChunks,{type:'audio/webm'});

        };

        mediaRecorder.start();

        recordBtn.dataset.recording = 'true';
        recordBtn.innerHTML = '⏹ Stop Recording';

        statusText.innerHTML = '🎤 Recording started...';

    }

}

/* Download Audio */
function downloadAudio(){

    if(!audioBlob){
        alert('No recording available.');
        return;
    }

    const url = URL.createObjectURL(audioBlob);

    const a = document.createElement('a');

    a.href = url;
    a.download = 'advert-recording.webm';

    a.click();

    statusText.innerHTML = '⬇ Audio downloaded successfully.';
}

</script>

</body>
  </html>
